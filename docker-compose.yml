services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mpct_tramites}
      POSTGRES_USER: ${POSTGRES_USER:-mpct}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Configure POSTGRES_PASSWORD en .env}
    volumes: [postgres_data:/var/lib/postgresql/data]
    ports: ["5432:5432"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"], interval: 10s, timeout: 5s, retries: 5 }
  api:
    build: ./backend/MpctTramites.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-mpct_tramites};Username=${POSTGRES_USER:-mpct};Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY}
      Cors__Origins__0: ${PUBLIC_URL:-http://localhost:8080}
      Database__MigrateOnStartup: "true"
      Seed__AdminEmail: ${SEED_ADMIN_EMAIL:-}
      Seed__AdminPassword: ${SEED_ADMIN_PASSWORD:-}
      MercadoPago__AccessToken: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MercadoPago__WebhookSecret: ${MERCADOPAGO_WEBHOOK_SECRET:-}
    volumes: [uploads:/app/storage]
    ports: ["5080:8080"]
    depends_on: { postgres: { condition: service_healthy } }
    healthcheck: { test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"], interval: 20s, timeout: 5s, retries: 5 }
  web:
    build: { context: ./frontend, args: { VITE_API_URL: /api } }
    ports: ["8080:80"]
    depends_on: { api: { condition: service_healthy } }
volumes: { postgres_data: {}, uploads: {} }
